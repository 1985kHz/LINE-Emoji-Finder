<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE EMOJI FINDER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────── */
:root {
  --bg:           #dde3ea;
  --glass:        rgba(255,255,255,0.48);
  --glass-mid:    rgba(255,255,255,0.62);
  --glass-strong: rgba(255,255,255,0.72);
  --glass-border: rgba(255,255,255,0.70);
  --glass-border2:rgba(255,255,255,0.50);
  --surface:      rgba(255,255,255,0.38);
  --surface-hover:rgba(255,255,255,0.72);
  --text:         #1a1f2e;
  --text-2:       #5a6070;
  --text-3:       #8a92a0;
  --accent:       #1a2240;
  --accent-soft:  rgba(26,34,64,0.07);
  --primary:      #3d5afe;
  --primary-dim:  rgba(61,90,254,0.11);
  --inp-bg:       rgba(255,255,255,0.60);
  --inp-border:   rgba(160,175,200,0.45);
  --inp-focus:    rgba(61,90,254,0.30);
  --icon-color:   #3a4255;

  --r-md:   0.875rem;
  --r-lg:   1.125rem;
  --r-xl:   1.625rem;
  --r-2xl:  2rem;
  --r-full: 9999px;

  --ease:      cubic-bezier(0.16,1,0.3,1);
  --ease-out:  cubic-bezier(0.0,0.0,0.2,1);
  --dur:       160ms;

  --sh-card:  0 2px 6px rgba(120,140,175,0.10), 0 10px 28px rgba(120,140,175,0.09);
  --sh-hover: 0 6px 28px rgba(80,110,175,0.20), 0 1px 6px rgba(80,110,175,0.10);
  --sh-glass: inset 0 1px 0 rgba(255,255,255,0.55), 0 2px 6px rgba(120,140,175,0.10), 0 10px 28px rgba(120,140,175,0.09);

  --font: 'DM Sans', system-ui, sans-serif;
  --max-w: 820px;
}
[data-theme="dark"] {
  --bg:           #13161e;
  --glass:        rgba(22,28,42,0.62);
  --glass-mid:    rgba(22,28,42,0.75);
  --glass-strong: rgba(22,28,42,0.88);
  --glass-border: rgba(255,255,255,0.09);
  --glass-border2:rgba(255,255,255,0.06);
  --surface:      rgba(22,28,42,0.52);
  --surface-hover:rgba(32,40,60,0.82);
  --text:         #e2e6f0;
  --text-2:       #8490a8;
  --text-3:       #50586e;
  --accent:       #e2e6f0;
  --accent-soft:  rgba(226,230,240,0.07);
  --primary:      #6b8cff;
  --primary-dim:  rgba(107,140,255,0.13);
  --inp-bg:       rgba(255,255,255,0.05);
  --inp-border:   rgba(255,255,255,0.11);
  --inp-focus:    rgba(107,140,255,0.28);
  --icon-color:   #8490a8;
  --sh-card:  0 2px 6px rgba(0,0,0,0.28), 0 10px 28px rgba(0,0,0,0.22);
  --sh-hover: 0 6px 28px rgba(0,0,0,0.40), 0 1px 6px rgba(0,0,0,0.16);
  --sh-glass: inset 0 1px 0 rgba(255,255,255,0.06), 0 2px 6px rgba(0,0,0,0.28), 0 10px 28px rgba(0,0,0,0.22);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme]){
    --bg:#13161e;--glass:rgba(22,28,42,0.62);--glass-mid:rgba(22,28,42,0.75);
    --glass-strong:rgba(22,28,42,0.88);--glass-border:rgba(255,255,255,0.09);
    --glass-border2:rgba(255,255,255,0.06);--surface:rgba(22,28,42,0.52);
    --surface-hover:rgba(32,40,60,0.82);--text:#e2e6f0;--text-2:#8490a8;--text-3:#50586e;
    --accent:#e2e6f0;--accent-soft:rgba(226,230,240,0.07);--primary:#6b8cff;
    --primary-dim:rgba(107,140,255,0.13);--inp-bg:rgba(255,255,255,0.05);
    --inp-border:rgba(255,255,255,0.11);--inp-focus:rgba(107,140,255,0.28);
    --icon-color:#8490a8;
    --sh-card:0 2px 6px rgba(0,0,0,0.28),0 10px 28px rgba(0,0,0,0.22);
    --sh-hover:0 6px 28px rgba(0,0,0,0.40),0 1px 6px rgba(0,0,0,0.16);
    --sh-glass:inset 0 1px 0 rgba(255,255,255,0.06),0 2px 6px rgba(0,0,0,0.28),0 10px 28px rgba(0,0,0,0.22);
  }
}

/* ─── BASE ───────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
body{
  min-height:100dvh;
  font-family:var(--font);
  font-size:clamp(0.875rem,0.84rem+0.2vw,1rem);
  color:var(--text);
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 90% 60% at 15% -5%,  rgba(195,215,245,0.65) 0%,transparent 60%),
    radial-gradient(ellipse 70% 60% at 85% 105%,  rgba(175,200,240,0.45) 0%,transparent 58%),
    radial-gradient(ellipse 50% 40% at 55% 50%,   rgba(220,228,242,0.20) 0%,transparent 55%);
  background-attachment:fixed;
}
[data-theme="dark"] body{
  background-image:
    radial-gradient(ellipse 90% 60% at 15% -5%,  rgba(35,52,105,0.35) 0%,transparent 60%),
    radial-gradient(ellipse 70% 60% at 85% 105%,  rgba(18,32,80,0.28) 0%,transparent 58%);
}
img{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a,button{transition:color var(--dur) var(--ease),background var(--dur) var(--ease),
  box-shadow var(--dur) var(--ease),transform var(--dur) var(--ease),
  opacity var(--dur) var(--ease),border-color var(--dur) var(--ease)}
:focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:4px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}

/* ─── HEADER ─────────────────────────── */
header{
  position:sticky;top:0;z-index:100;
  background:var(--glass);
  backdrop-filter:blur(40px) saturate(2.0);
  -webkit-backdrop-filter:blur(40px) saturate(2.0);
  border-bottom:1px solid var(--glass-border);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.40);
}
.header-inner{
  max-width:var(--max-w);
  margin-inline:auto;
  padding:0.875rem 1.5rem;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
}
.header-logo{
  grid-column:2;justify-self:center;
  display:flex;align-items:center;gap:0.5rem;
  text-decoration:none;color:var(--text);
}

.logo-name{
  font-size:0.75rem;font-weight:600;
  letter-spacing:0.08em;color:var(--text);
}
.header-right{grid-column:3;justify-self:end}
.icon-btn{
  width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-md);
  color:var(--text-3);
  background:var(--glass-mid);
  border:1px solid var(--glass-border2);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.icon-btn:hover{background:var(--glass-strong);color:var(--text-2)}

/* ─── PAGE ───────────────────────────── */
.page{
  max-width:var(--max-w);
  margin-inline:auto;
  padding:clamp(2rem,5vw,3rem) 1.5rem clamp(2rem,5vw,4rem);
  display:flex;flex-direction:column;gap:1rem;
}

/* ─── SEARCH CARD ─────────────────────── */
.search-card{
  background:var(--glass);
  backdrop-filter:blur(48px) saturate(2.2);
  -webkit-backdrop-filter:blur(48px) saturate(2.2);
  border:1px solid var(--glass-border);
  border-radius:var(--r-2xl);
  box-shadow:var(--sh-glass);
  padding:clamp(1.25rem,3.5vw,1.75rem);
}
.search-wrap{position:relative}
.search-input{
  width:100%;
  padding:0.8125rem 2.75rem 0.8125rem 2.75rem;
  font-family:var(--font);
  font-size:clamp(0.875rem,0.84rem+0.2vw,1rem);
  font-weight:400;
  background:var(--inp-bg);
  border:1px solid var(--inp-border);
  border-radius:var(--r-full);
  color:var(--text);
  outline:none;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.40), 0 1px 3px rgba(120,140,175,0.08);
  transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease);
  -webkit-appearance:none;appearance:none;
}
.search-input::-webkit-search-cancel-button,
.search-input::-webkit-search-decoration,
.search-input::-ms-clear{display:none;-webkit-appearance:none;appearance:none}
.search-input::placeholder{color:var(--text-3);font-weight:300}
.search-input:focus{
  border-color:var(--inp-focus);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.40),0 0 0 4px var(--primary-dim),0 1px 3px rgba(120,140,175,0.08);
}
.s-icon{
  position:absolute;left:0.9375rem;top:50%;transform:translateY(-50%);
  color:var(--icon-color);pointer-events:none;display:flex;align-items:center;
}
.s-clear{
  position:absolute;right:0.8125rem;top:50%;transform:translateY(-50%);
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-full);color:var(--text-3);
  opacity:0;pointer-events:none;
  transition:opacity var(--dur) var(--ease),background var(--dur) var(--ease),color var(--dur) var(--ease);
}
.s-clear.on{opacity:1;pointer-events:auto}
.s-clear:hover{background:var(--accent-soft);color:var(--text-2)}
.search-sub{
  margin-top:0.625rem;
  font-size:0.71875rem;font-weight:300;
  color:var(--text-3);letter-spacing:0.015em;min-height:1.2em;
}

/* ─── RESULTS CARD ────────────────────── */
.results-card{
  background:var(--glass);
  backdrop-filter:blur(48px) saturate(2.2);
  -webkit-backdrop-filter:blur(48px) saturate(2.2);
  border:1px solid var(--glass-border);
  border-radius:var(--r-2xl);
  box-shadow:var(--sh-glass);
  overflow:hidden;
  transition:height 0.44s cubic-bezier(0.4,0,0.2,1);
}
/* height animation wrapper */

.results-inner{padding:clamp(1.125rem,3vw,1.625rem)}

/* STATE */
.state{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
  padding:clamp(2rem,6vw,3rem) 1.5rem;
  color:var(--text-3);gap:0.5rem;
}

.state-icon{
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-3);margin-bottom:0.5rem;
}
.state-label{
  display:flex;align-items:baseline;gap:0.5rem;
  flex-wrap:wrap;justify-content:center;
}
.state-ja{
  font-size:0.8125rem;font-weight:400;color:var(--text-2);
}
.state-en{
  font-size:0.8125rem;font-weight:300;color:var(--text-3);letter-spacing:0.01em;
}

/* ─── GRID & CARD ANIMATION ──────────── */
@keyframes card-in{
  from{opacity:0;transform:translateY(18px) scale(0.96)}
  to  {opacity:1;transform:translateY(0)    scale(1)   }
}

.emoji-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(76px,1fr));
  gap:0.625rem;
}
.emoji-card{
  position:relative;aspect-ratio:1;
  background:var(--surface);
  border:1px solid var(--glass-border);
  border-radius:var(--r-lg);
  overflow:hidden;display:block;text-decoration:none;
  /* glass highlight line at top */
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.50), 0 1px 3px rgba(120,140,175,0.10);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  /* entrance animation — staggered via JS inline style */
  opacity:0;
  animation:card-in 0.65s cubic-bezier(0.22,1,0.36,1) forwards;
  transition:transform var(--dur) var(--ease),
             box-shadow var(--dur) var(--ease),
             background var(--dur) var(--ease),
             border-color var(--dur) var(--ease);
}
.emoji-card:hover{
  transform:translateY(-4px) scale(1.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.70),var(--sh-hover);
  background:var(--surface-hover);
  border-color:rgba(255,255,255,0.90);
  z-index:2;
}
.emoji-card:active{transform:translateY(-1px) scale(1.03)}
.emoji-card img{width:100%;height:100%;object-fit:contain;padding:0.5rem}
.emoji-lbl{
  position:absolute;bottom:0;left:0;right:0;
  padding:0.2rem 0.375rem;
  font-size:9px;font-weight:400;letter-spacing:0.02em;
  color:var(--text-2);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:var(--glass-strong);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  opacity:0;transform:translateY(4px);
  transition:opacity var(--dur) var(--ease),transform var(--dur) var(--ease);
}
.emoji-card:hover .emoji-lbl{opacity:1;transform:translateY(0)}
.emoji-err{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-3);
}

/* FOOTER */
footer{
  text-align:center;font-size:0.6875rem;font-weight:300;
  color:var(--text-3);letter-spacing:0.02em;
  padding:0.375rem 1.5rem 1.25rem;
}

/* RESPONSIVE */
@media(max-width:600px){
  .page{padding:1.25rem 1rem 3rem}
  .emoji-grid{grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:0.5rem}
  .header-inner{padding:0.75rem 1rem}
}
</style>
</head>
<body>
<a href="#main" class="sr-only">メインへスキップ</a>

<header>
  <div class="header-inner">
    <div></div>
    <a href="#" class="header-logo" aria-label="LINE EMOJI FINDER">
      <span class="logo-name">LINE EMOJI FINDER</span>
    </a>
    <div class="header-right">
      <button class="icon-btn" data-theme-toggle aria-label="ダークモードへ">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<main class="page" id="main">

  <div class="search-card">
    <div class="search-wrap">
      <span class="s-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="OK、Good、!、z、おやすみ、笑　…"
        autocomplete="off" spellcheck="false"
        aria-label="絵文字キーワード検索"
      >
      <button class="s-clear" id="searchClear" aria-label="クリア" tabindex="-1">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <p class="search-sub" id="searchSub">OCRで抽出したテキストをリアルタイム検索します / Searches OCR-extracted text in real time</p>
  </div>

  <div class="results-card">
    <div class="results-inner" id="resultsBody">

      <!-- Initial: keyword prompt -->
      <div class="state" id="stateInitial">
        <div class="state-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </div>
        <div class="state-label">
          <span class="state-ja">キーワードを入力してください</span>
          <span class="state-en">Enter a keyword to search</span>
        </div>
      </div>

      <!-- Empty: no results -->
      <div class="state" id="stateEmpty" style="display:none">
        <div class="state-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M16 16s-1.5-2-4-2-4 2-4 2"/>
            <line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
        </div>
        <div class="state-label">
          <span class="state-ja">見つかりませんでした</span>
          <span class="state-en">No results found</span>
        </div>
      </div>

      <!-- Results grid -->
      <div class="emoji-grid" id="emojiGrid" style="display:none"></div>

    </div>
  </div>

  <footer>絵文字をクリックするとLINE STOREの購入ページへ移動します / Click an emoji to visit its LINE STORE page</footer>
</main>

<script>
/* ocr_result.json は fetch で読み込まれます */
</script>
<script>
// THEME
(function(){
  const btn = document.querySelector('[data-theme-toggle]');
  const root = document.documentElement;
  const SUN  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  const MOON = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  let t = root.getAttribute('data-theme') || 'light';
  if(btn) {
    btn.innerHTML = t === 'dark' ? SUN : MOON;
    btn.addEventListener('click', () => {
      t = t === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', t);
      btn.innerHTML = t === 'dark' ? SUN : MOON;
      btn.setAttribute('aria-label', t === 'dark' ? 'ライトモードへ' : 'ダークモードへ');
    });
  }
})();

// SEARCH
(async function() {

  // ── JSON load ──
  let data;
  try {
    const res = await fetch('./ocr_result.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch(e) {
    document.getElementById('stateInitial').innerHTML = `
      <div class="state-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <div class="state-label">
        <span class="state-ja">JSONの読み込みに失敗しました</span>
        <span class="state-en">Failed to load ocr_result.json</span>
      </div>`;
    console.error('ocr_result.json load error:', e);
    return;
  }

const inp  = document.getElementById('searchInput');
const clr  = document.getElementById('searchClear');
const sub  = document.getElementById('searchSub');
const grid = document.getElementById('emojiGrid');
const si   = document.getElementById('stateInitial');
const se   = document.getElementById('stateEmpty');
const rb   = document.getElementById('resultsBody');
const card = rb.closest('.results-card');

// Animate results-card height smoothly in both directions
function animateHeight(updateFn) {
  // 1. Lock current height (px) and disable transition
  const fromH = card.scrollHeight;
  card.style.transition = 'none';
  card.style.height = fromH + 'px';
  card.getBoundingClientRect(); // flush

  // 2. Apply DOM changes while height is locked
  updateFn();

  // 3. Measure the NEW natural height by temporarily releasing the lock
  card.style.height = '';          // release to auto
  const toH = card.scrollHeight;  // read true target height
  card.style.height = fromH + 'px'; // re-lock at old height
  card.getBoundingClientRect(); // flush again

  // 4. Enable transition and animate to target
  card.style.transition = '';
  requestAnimationFrame(() => {
    card.style.height = toH + 'px';
    card.addEventListener('transitionend', () => {
      card.style.height = '';   // release to auto for responsiveness
      card.style.transition = '';
    }, { once: true });
  });
}

const ERR = `<div class="emoji-err" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>`;

function search(q) {
  const t = q.trim().toLowerCase();
  if(!t) return [];
  const res = [];
  for(const [setId, set] of Object.entries(data.emoji_sets)) {
    for(const [imgId, img] of Object.entries(set.images)) {
      const ft = (img.full_text||'').toLowerCase();
      if(ft && ft.includes(t)) res.push({
        label: img.full_text,
        imgUrl:`https://stickershop.line-scdn.net/sticonshop/v1/sticon/${setId}/iPhone/${imgId}.png`,
        href:  `https://store.line.me/emojishop/product/${setId}/ja`
      });
    }
  }
  return res;
}

function render(results) {
  if(!results.length) {
    animateHeight(() => {
      si.style.display = 'none';
      se.style.display = 'flex';
      grid.style.display = 'none';
      grid.replaceChildren();
    });
    sub.textContent = '一致する絵文字が見つかりませんでした / No emoji found';
    return;
  }

  sub.textContent = results.length + ' HIT';

  // Build fragment before touching DOM height
  const STAGGER = 48, MAX_DELAY = 700;
  const frag = document.createDocumentFragment();
  results.forEach((r, i) => {
    const delay = Math.min(i * STAGGER, MAX_DELAY);
    const a = document.createElement('a');
    a.className = 'emoji-card';
    a.href = r.href; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.setAttribute('aria-label', (r.label||'絵文字') + ' — LINE STOREで購入');
    a.style.animationDelay = delay + 'ms';
    const img = document.createElement('img');
    img.src = r.imgUrl; img.alt = r.label||'';
    img.width = 80; img.height = 80;
    img.loading = 'lazy'; img.decoding = 'async';
    img.onerror = function(){ a.innerHTML = ERR; };
    a.appendChild(img);
    if(r.label) {
      const lbl = document.createElement('span');
      lbl.className = 'emoji-lbl'; lbl.textContent = r.label;
      a.appendChild(lbl);
    }
    frag.appendChild(a);
  });

  animateHeight(() => {
    si.style.display = 'none';
    se.style.display = 'none';
    grid.style.display = 'grid';
    grid.replaceChildren(frag);
  });
}

function reset() {
  animateHeight(() => {
    si.style.display = '';
    se.style.display = 'none';
    grid.style.display = 'none';
    grid.replaceChildren();
  });
  sub.textContent = 'OCRで抽出したテキストをリアルタイム検索します / Searches OCR-extracted text in real time';
}

let timer = null;
let composing = false;

inp.addEventListener('compositionstart', () => { composing = true; });
inp.addEventListener('compositionend', () => {
  composing = false;
  const v = inp.value;
  clr.classList.toggle('on', v.length > 0);
  clearTimeout(timer);
  if(!v.trim()) { reset(); return; }
  timer = setTimeout(() => render(search(v)), 180);
});

inp.addEventListener('input', function() {
  const v = this.value;
  clr.classList.toggle('on', v.length > 0);
  if(composing) return;
  clearTimeout(timer);
  if(!v.trim()) { reset(); return; }
  timer = setTimeout(() => render(search(v)), 180);
});

clr.addEventListener('click', () => {
  inp.value = ''; clr.classList.remove('on');
  reset(); inp.focus();
});

})();
</script>
</body>
</html>
