<style>
/* ─── TOKENS ─────────────────────────── */
:root {
  --bg:           #dde3ea;
  --glass:        rgba(255,255,255,0.48);
  --glass-mid:    rgba(255,255,255,0.62);
  --glass-strong: rgba(255,255,255,0.72);
  --glass-border: rgba(255,255,255,0.70);
  --glass-border2:rgba(255,255,255,0.50);
  --surface:      rgba(255,255,255,0.38);
  --surface-hover:rgba(255,255,255,0.72);
  --text:         #1a1f2e;
  --text-2:       #5a6070;
  --text-3:       #8a92a0;
  --accent:       #1a2240;
  --accent-soft:  rgba(26,34,64,0.07);
  --primary:      #3d5afe;
  --primary-dim:  rgba(61,90,254,0.11);
  --inp-bg:       rgba(255,255,255,0.60);
  --inp-border:   rgba(160,175,200,0.45);
  --inp-focus:    rgba(61,90,254,0.30);
  --icon-color:   #3a4255;

  --r-md:   0.875rem;
  --r-lg:   1.125rem;
  --r-xl:   1.625rem;
  --r-2xl:  2rem;
  --r-full: 9999px;

  --ease:      cubic-bezier(0.16,1,0.3,1);
  --ease-out:  cubic-bezier(0.0,0.0,0.2,1);
  --dur:       160ms;

  --sh-card:  0 2px 6px rgba(120,140,175,0.10), 0 10px 28px rgba(120,140,175,0.09);
  --sh-hover: 0 6px 28px rgba(80,110,175,0.20), 0 1px 6px rgba(80,110,175,0.10);
  --sh-glass: inset 0 1px 0 rgba(255,255,255,0.55), 0 2px 6px rgba(120,140,175,0.10), 0 10px 28px rgba(120,140,175,0.09);

  --font: 'DM Sans', system-ui, sans-serif;
  --max-w: 820px;
  --header-h: 0px;
}
[data-theme="dark"] {
  --bg:           #13161e;
  --glass:        rgba(22,28,42,0.62);
  --glass-mid:    rgba(22,28,42,0.75);
  --glass-strong: rgba(22,28,42,0.88);
  --glass-border: rgba(255,255,255,0.09);
  --glass-border2:rgba(255,255,255,0.06);
  --surface:      rgba(22,28,42,0.52);
  --surface-hover:rgba(32,40,60,0.82);
  --text:         #e2e6f0;
  --text-2:       #8490a8;
  --text-3:       #50586e;
  --accent:       #e2e6f0;
  --accent-soft:  rgba(226,230,240,0.07);
  --primary:      #6b8cff;
  --primary-dim:  rgba(107,140,255,0.13);
  --inp-bg:       rgba(255,255,255,0.05);
  --inp-border:   rgba(255,255,255,0.11);
  --inp-focus:    rgba(107,140,255,0.28);
  --icon-color:   #8490a8;
  --sh-card:  0 2px 6px rgba(0,0,0,0.28), 0 10px 28px rgba(0,0,0,0.22);
  --sh-hover: 0 6px 28px rgba(0,0,0,0.40), 0 1px 6px rgba(0,0,0,0.16);
  --sh-glass: inset 0 1px 0 rgba(255,255,255,0.06), 0 2px 6px rgba(0,0,0,0.28), 0 10px 28px rgba(0,0,0,0.22);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme]){
    --bg:#13161e;--glass:rgba(22,28,42,0.62);--glass-mid:rgba(22,28,42,0.75);
    --glass-strong:rgba(22,28,42,0.88);--glass-border:rgba(255,255,255,0.09);
    --glass-border2:rgba(255,255,255,0.06);--surface:rgba(22,28,42,0.52);
    --surface-hover:rgba(32,40,60,0.82);--text:#e2e6f0;--text-2:#8490a8;--text-3:#50586e;
    --accent:#e2e6f0;--accent-soft:rgba(226,230,240,0.07);--primary:#6b8cff;
    --primary-dim:rgba(107,140,255,0.13);--inp-bg:rgba(255,255,255,0.05);
    --inp-border:rgba(255,255,255,0.11);--inp-focus:rgba(107,140,255,0.28);
    --icon-color:#8490a8;
    --sh-card:0 2px 6px rgba(0,0,0,0.28),0 10px 28px rgba(0,0,0,0.22);
    --sh-hover:0 6px 28px rgba(0,0,0,0.40),0 1px 6px rgba(0,0,0,0.16);
    --sh-glass:inset 0 1px 0 rgba(255,255,255,0.06),0 2px 6px rgba(0,0,0,0.28),0 10px 28px rgba(0,0,0,0.22);
  }
}

/* ─── BASE ───────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
body{
  min-height:100dvh;
  font-family:var(--font);
  font-size:clamp(1rem,0.84rem+0.2vw,1rem);
  color:var(--text);
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 90% 60% at 15% -5%,  rgba(195,215,245,0.65) 0%,transparent 60%),
    radial-gradient(ellipse 70% 60% at 85% 105%,  rgba(175,200,240,0.45) 0%,transparent 58%),
    radial-gradient(ellipse 50% 40% at 55% 50%,   rgba(220,228,242,0.20) 0%,transparent 55%);
  background-attachment:fixed;
}
[data-theme="dark"] body{
  background-image:
    radial-gradient(ellipse 90% 60% at 15% -5%,  rgba(35,52,105,0.35) 0%,transparent 60%),
    radial-gradient(ellipse 70% 60% at 85% 105%,  rgba(18,32,80,0.28) 0%,transparent 58%);
}
img{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a,button{transition:color var(--dur) var(--ease),background var(--dur) var(--ease),
  box-shadow var(--dur) var(--ease),transform var(--dur) var(--ease),
  opacity var(--dur) var(--ease),border-color var(--dur) var(--ease)}
:focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:4px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}

/* ─── HEADER ─────────────────────────── */
header{
  position:sticky;top:0;z-index:100;
  background:var(--glass);
  backdrop-filter:blur(40px) saturate(2.0);
  -webkit-backdrop-filter:blur(40px) saturate(2.0);
  border-bottom:1px solid var(--glass-border);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.40);
}
.header-inner{
  max-width:var(--max-w);
  margin-inline:auto;
  padding:0.875rem 1.5rem;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
}
.header-logo{
  grid-column:1;justify-self:start;
  display:flex;align-items:center;gap:0.5rem;
  text-decoration:none;color:var(--text);
  background:none;border:none;padding:0;cursor:pointer;
}

.logo-name{
  font-size:0.75rem;font-weight:600;
  letter-spacing:0.08em;color:var(--text);
}
.logo-icon{
  width:20px;height:20px;
  display:block;
  flex-shrink:0;
}
.header-right{grid-column:3;justify-self:end}
.icon-btn{
  width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-md);
  color:var(--text-3);
  background:var(--glass-mid);
  border:1px solid var(--glass-border2);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.icon-btn:hover{background:var(--glass-strong);color:var(--text-2)}

/* ─── PAGE ───────────────────────────── */
.page{
  max-width:var(--max-w);
  margin-inline:auto;
  padding:calc(clamp(2rem,5vw,3rem) + var(--header-h)) 1.5rem clamp(2rem,5vw,4rem);
  display:flex;flex-direction:column;gap:1rem;
}

/* ─── SEARCH CARD ─────────────────────── */
.search-card{
  background:var(--glass);
  backdrop-filter:blur(48px) saturate(2.2);
  -webkit-backdrop-filter:blur(48px) saturate(2.2);
  border:1px solid var(--glass-border);
  border-radius:var(--r-2xl);
  box-shadow:var(--sh-glass);
  padding:clamp(1.25rem,3.5vw,1.75rem);
}
.search-wrap{position:relative}
.search-input{
  width:100%;
  padding:0.8125rem 2.75rem 0.8125rem 2.75rem;
  font-family:var(--font);
  font-size:clamp(1rem,0.84rem+0.2vw,1rem);
  font-weight:400;
  background:var(--inp-bg);
  border:1px solid var(--inp-border);
  border-radius:var(--r-full);
  color:var(--text);
  outline:none;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.40), 0 1px 3px rgba(120,140,175,0.08);
  transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease);
  -webkit-appearance:none;appearance:none;
}
.search-input::-webkit-search-cancel-button,
.search-input::-webkit-search-decoration,
.search-input::-ms-clear{display:none;-webkit-appearance:none;appearance:none}
.search-input::placeholder{color:var(--text-3);font-weight:300}
.search-input:focus{
  border-color:var(--inp-focus);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.40),0 0 0 4px var(--primary-dim),0 1px 3px rgba(120,140,175,0.08);
}
.s-icon{
  position:absolute;left:0.9375rem;top:50%;transform:translateY(-50%);
  color:var(--icon-color);pointer-events:none;display:flex;align-items:center;
}
.s-clear{
  position:absolute;right:0.8125rem;top:50%;transform:translateY(-50%);
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-full);color:var(--text-3);
  opacity:0;pointer-events:none;
  transition:opacity var(--dur) var(--ease),background var(--dur) var(--ease),color var(--dur) var(--ease);
}
.s-clear.on{opacity:1;pointer-events:auto}
.s-clear:hover{background:var(--accent-soft);color:var(--text-2)}
.search-sub{
  margin-top:0.625rem;
  font-size:0.71875rem;font-weight:300;
  color:var(--text-3);letter-spacing:0.015em;min-height:1.2em;
}

/* ─── RESULTS CARD ────────────────────── */
.results-card{
  background:var(--glass);
  backdrop-filter:blur(48px) saturate(2.2);
  -webkit-backdrop-filter:blur(48px) saturate(2.2);
  border:1px solid var(--glass-border);
  border-radius:var(--r-2xl);
  box-shadow:var(--sh-glass);
  overflow:hidden;
  transition:height 0.6s cubic-bezier(0.16,1,0.3,1);
}
/* height animation wrapper */

.results-inner{padding:clamp(1.125rem,3vw,1.625rem)}

/* STATE */
.state{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
  padding:clamp(2rem,6vw,3rem) 1.5rem;
  color:var(--text-3);gap:0.5rem;
}

.state-icon{
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-3);margin-bottom:0.5rem;
}
.state-label{
  display:flex;align-items:baseline;gap:0.5rem;
  flex-wrap:wrap;justify-content:center;
}
.state-ja{
  font-size:0.8125rem;font-weight:400;color:var(--text-2);
}
.state-en{
  font-size:0.8125rem;font-weight:300;color:var(--text-3);letter-spacing:0.01em;
}

/* ─── GRID & CARD ANIMATION ──────────── */
@keyframes card-in{
  from{opacity:0;transform:translateY(18px) scale(0.96)}
  to  {opacity:1;transform:translateY(0)    scale(1)   }
}

.emoji-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(76px,1fr));
  gap:0.625rem;
}
.emoji-card{
  position:relative;aspect-ratio:1;
  background:var(--surface);
  border:1px solid var(--glass-border);
  border-radius:var(--r-lg);
  overflow:hidden;display:block;text-decoration:none;
  /* glass highlight line at top */
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.50), 0 1px 3px rgba(120,140,175,0.10);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  /* entrance animation — staggered via JS inline style */
  opacity:0;
  animation:card-in 0.65s cubic-bezier(0.22,1,0.36,1) forwards;
  transition:transform var(--dur) var(--ease),
             box-shadow var(--dur) var(--ease),
             background var(--dur) var(--ease),
             border-color var(--dur) var(--ease);
}
.emoji-card:hover{
  transform:translateY(-4px) scale(1.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.70),var(--sh-hover);
  background:var(--surface-hover);
  border-color:rgba(255,255,255,0.90);
  z-index:2;
}
.emoji-card:active{transform:translateY(-1px) scale(1.03)}
.emoji-card img{width:100%;height:100%;object-fit:contain;padding:0.5rem}
.emoji-lbl{
  position:absolute;bottom:0;left:0;right:0;
  padding:0.2rem 0.375rem;
  font-size:9px;font-weight:400;letter-spacing:0.02em;
  color:var(--text-2);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:var(--glass-strong);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  opacity:0;transform:translateY(4px);
  transition:opacity var(--dur) var(--ease),transform var(--dur) var(--ease);
}
.emoji-card:hover .emoji-lbl{opacity:1;transform:translateY(0)}
.emoji-err{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-3);
}

/* FOOTER — replaced by .site-footer */
footer{display:none}



/* SITE FOOTER */
.site-footer{
  text-align:center;
  padding:0.5rem 1.5rem 1.5rem;
  display:flex;flex-direction:column;gap:0.375rem;
  align-items:center;
}
.site-footer-hint{
  font-size:0.6875rem;font-weight:300;
  color:var(--text-3);letter-spacing:0.02em;
}
.x-link{
  display:inline-flex;align-items:center;gap:0.3125rem;
  font-size:0.625rem;font-weight:400;
  color:var(--text-3);letter-spacing:0.02em;
  text-decoration:none;
  opacity:0.55;
  transition:opacity var(--dur) var(--ease),color var(--dur) var(--ease);
}
.x-link:hover{opacity:1;color:var(--text-2)}
.x-link svg{flex-shrink:0;}

/* RESPONSIVE */
@media(max-width:600px){
  .page{padding:calc(1.25rem + var(--header-h)) 1rem 3rem}
  #emojiGrid[data-size="lg"], #emojiGrid:not([data-size]) { grid-template-columns:repeat(auto-fill,minmax(88px,1fr)) !important; gap:0.4rem !important; }
  #emojiGrid[data-size="md"] { grid-template-columns:repeat(auto-fill,minmax(68px,1fr)) !important; gap:0.3rem !important; }
  #emojiGrid[data-size="sm"] { grid-template-columns:repeat(auto-fill,minmax(52px,1fr)) !important; gap:0.25rem !important; }
  .header-inner{padding:0.75rem 1rem}
}

/* iOS auto-zoom fix: input font-size must be >= 16px */
@supports (-webkit-touch-callout: none) {
  .search-input {
    font-size: 16px;
  }
}

/* ═══ ENHANCEMENT LAYER ═══ */
html.theme-switching *, html.theme-switching *::before, html.theme-switching *::after {
  transition: color .80s cubic-bezier(0.4,0,0.2,1), background-color .80s cubic-bezier(0.4,0,0.2,1), background .80s cubic-bezier(0.4,0,0.2,1), border-color .80s cubic-bezier(0.4,0,0.2,1), box-shadow .80s cubic-bezier(0.4,0,0.2,1), opacity .80s cubic-bezier(0.4,0,0.2,1) !important;
}
html.theme-switching .orb, html.theme-switching .starfield,
html.theme-switching .emoji-card, html.theme-switching .emoji-card img { transition: none !important; }
.header-right { display:flex !important; align-items:center !important; flex-wrap:nowrap !important; gap:4px !important; }
.size-theme-sep { width:30px; flex-shrink:0; }
:root { --primary:#1e9790 !important; --primary-dim:rgba(30,151,144,0.12) !important; --glass:rgba(255,255,255,0.62) !important; --inp-bg:rgba(255,255,255,0.72) !important; }
[data-theme="dark"] { --primary:#26b5ad !important; --primary-dim:rgba(38,181,173,0.14) !important; --glass:rgba(30,32,48,0.68) !important; --inp-bg:rgba(30,32,48,0.72) !important; }
header { backdrop-filter:blur(48px) saturate(2.5) brightness(1.06) !important; -webkit-backdrop-filter:blur(48px) saturate(2.5) brightness(1.06) !important; border-bottom:1px solid rgba(255,255,255,0.55) !important; box-shadow:0 8px 32px rgba(120,140,175,0.14),inset 0 1px 0 rgba(255,255,255,0.72) !important; }
[data-theme="dark"] header { border-bottom:1px solid rgba(255,255,255,0.10) !important; box-shadow:0 8px 32px rgba(0,0,0,0.38),inset 0 1px 0 rgba(255,255,255,0.08) !important; }
.search-card,.results-card { backdrop-filter:blur(56px) saturate(2.8) brightness(1.08) !important; -webkit-backdrop-filter:blur(56px) saturate(2.8) brightness(1.08) !important; border:1px solid rgba(255,255,255,0.60) !important; box-shadow:0 8px 32px rgba(120,140,175,0.16),inset 0 1px 0 rgba(255,255,255,0.72) !important; }
[data-theme="dark"] .search-card,[data-theme="dark"] .results-card { border:1px solid rgba(255,255,255,0.09) !important; box-shadow:0 8px 32px rgba(0,0,0,0.42),inset 0 1px 0 rgba(255,255,255,0.07) !important; }
.search-input { backdrop-filter:blur(32px) saturate(2.2) brightness(1.06) !important; -webkit-backdrop-filter:blur(32px) saturate(2.2) brightness(1.06) !important; border:1px solid rgba(255,255,255,0.55) !important; box-shadow:inset 0 1px 0 rgba(255,255,255,0.70),0 2px 8px rgba(120,140,175,0.08) !important; }
[data-theme="dark"] .search-input { border:1px solid rgba(255,255,255,0.08) !important; }
.search-input:focus { border-color:transparent !important; box-shadow:inset 0 1px 0 rgba(255,255,255,0.70),0 0 0 2px rgba(30,151,144,0.30),0 2px 8px rgba(120,140,175,0.08) !important; }
[data-theme="dark"] .search-input:focus { box-shadow:inset 0 1px 0 rgba(255,255,255,0.06),0 0 0 2px rgba(38,181,173,0.36),0 2px 8px rgba(0,0,0,0.18) !important; }
.search-input:focus-visible { outline:none; }
.s-clear { transition:opacity var(--dur) var(--ease),background var(--dur) var(--ease),color var(--dur) var(--ease),transform 0.32s cubic-bezier(0.16,1,0.3,1) !important; }
.s-clear:not(.on) { transform:translateY(-50%) scale(0.6) rotate(-60deg) !important; opacity:0 !important; pointer-events:none !important; }
.s-clear.on { transform:translateY(-50%) scale(1) rotate(0deg) !important; opacity:1 !important; pointer-events:auto !important; }
.s-clear.on:hover  { transform:translateY(-50%) scale(1.18) rotate(90deg) !important; }
.s-clear.on:active { transform:translateY(-50%) scale(0.88) rotate(90deg) !important; }
.icon-btn { transition:background var(--dur) var(--ease),color var(--dur) var(--ease),transform .18s cubic-bezier(0.16,1,0.3,1) !important; }
.icon-btn:hover { transform:scale(1.10) !important; } .icon-btn:active { transform:scale(0.88) !important; }
.state-icon { animation:breathe 3.5s ease-in-out infinite; }
@keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.45;transform:scale(.88)} }
.search-sub { transition:opacity .18s ease,transform .18s cubic-bezier(0.16,1,0.3,1) !important; }
.search-sub.morph-out { opacity:0;transform:translateY(4px); }
.emoji-card { overflow:hidden; aspect-ratio:1; width:auto; height:auto;
  transition:transform .32s cubic-bezier(0.16,1,0.3,1),box-shadow .32s cubic-bezier(0.16,1,0.3,1),background .32s cubic-bezier(0.16,1,0.3,1),filter .32s ease !important; }
.emoji-card::before { display:none !important; }
.emoji-card:hover { transform:translateY(-1px) scale(1.01) !important; filter:brightness(1.05) drop-shadow(0 6px 14px rgba(30,151,144,0.20)) !important; box-shadow:inset 0 1px 0 rgba(255,255,255,.80),0 8px 22px rgba(30,151,144,.14),0 2px 6px rgba(30,151,144,.08) !important; background:var(--glass) !important; z-index:3; }
[data-theme="dark"] .emoji-card:hover { filter:brightness(1.08) drop-shadow(0 6px 14px rgba(38,181,173,.28)) !important; box-shadow:inset 0 1px 0 rgba(255,255,255,.10),0 8px 22px rgba(0,0,0,.45),0 2px 6px rgba(0,0,0,.22) !important; }
.emoji-card:active { transform:translateY(-1px) scale(1.02) !important; }
.emoji-card img { width:100%;height:100%;object-fit:contain;padding:0.5rem; transition:transform .35s cubic-bezier(0.16,1,0.3,1) !important; }
.emoji-card:hover img { transform:none !important; }
#emojiGrid { display:grid !important; }
#emojiGrid[data-size="sm"] { grid-template-columns:repeat(14,1fr) !important; gap:0.3rem !important; }
#emojiGrid[data-size="md"], #emojiGrid:not([data-size]) { grid-template-columns:repeat(11,1fr) !important; gap:0.4rem !important; }
#emojiGrid[data-size="lg"] { grid-template-columns:repeat(8,1fr) !important; gap:0.375rem !important; }
@keyframes fade-up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.results-card { animation:fade-up .60s cubic-bezier(0.16,1,0.3,1) .10s both; }
.site-footer  { animation:fade-up .60s cubic-bezier(0.16,1,0.3,1) .18s both; }
.fluid-orbs { position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden; }
.orb { position:absolute;border-radius:50%;will-change:transform,opacity; }
.orb-1{width:72vw;height:72vw;top:-22%;left:-18%;background:radial-gradient(circle,rgba(160,195,255,.82) 0%,rgba(140,180,255,.50) 40%,transparent 72%);filter:blur(64px);animation:orb1 16s ease-in-out infinite alternate}
.orb-2{width:58vw;height:58vw;bottom:-18%;right:-14%;background:radial-gradient(circle,rgba(190,170,255,.76) 0%,rgba(170,150,245,.48) 40%,transparent 72%);filter:blur(68px);animation:orb2 20s ease-in-out infinite alternate}
.orb-3{width:46vw;height:46vw;top:38%;left:26%;background:radial-gradient(circle,rgba(150,225,205,.72) 0%,rgba(130,210,190,.44) 40%,transparent 72%);filter:blur(58px);animation:orb3 14s ease-in-out infinite alternate}
.orb-4{width:36vw;height:36vw;top:6%;right:6%;background:radial-gradient(circle,rgba(255,200,165,.68) 0%,rgba(245,180,145,.42) 40%,transparent 72%);filter:blur(56px);animation:orb4 18s ease-in-out infinite alternate}
[data-theme="dark"] .orb-1{background:radial-gradient(circle,rgba(50,90,190,.72) 0%,rgba(40,75,170,.44) 40%,transparent 72%)}
[data-theme="dark"] .orb-2{background:radial-gradient(circle,rgba(90,60,175,.66) 0%,rgba(75,50,155,.40) 40%,transparent 72%)}
[data-theme="dark"] .orb-3{background:radial-gradient(circle,rgba(25,110,90,.60) 0%,rgba(20,95,78,.36) 40%,transparent 72%)}
[data-theme="dark"] .orb-4{background:radial-gradient(circle,rgba(160,80,50,.56) 0%,rgba(145,70,42,.34) 40%,transparent 72%)}
@keyframes orb1{0%{transform:translate(0,0) scale(1);opacity:.82}30%{transform:translate(9vw,6vh) scale(1.12);opacity:.96}65%{transform:translate(5vw,13vh) scale(.91);opacity:.78}100%{transform:translate(12vw,9vh) scale(1.08);opacity:.92}}
@keyframes orb2{0%{transform:translate(0,0) scale(1);opacity:.76}40%{transform:translate(-9vw,-10vh) scale(1.11);opacity:.92}75%{transform:translate(-13vw,-6vh) scale(.93);opacity:.74}100%{transform:translate(-8vw,-12vh) scale(1.07);opacity:.88}}
@keyframes orb3{0%{transform:translate(0,0) scale(1) rotate(0deg);opacity:.74}50%{transform:translate(-8vw,9vh) scale(1.15) rotate(14deg);opacity:.92}100%{transform:translate(9vw,-8vh) scale(.88) rotate(-11deg);opacity:.78}}
@keyframes orb4{0%{transform:translate(0,0) scale(1);opacity:.70}45%{transform:translate(7vw,11vh) scale(1.18);opacity:.88}100%{transform:translate(-7vw,7vh) scale(.92);opacity:.72}}
.page{position:relative;z-index:1}
@media(prefers-reduced-motion:reduce){.fluid-orbs{display:none}}
.starfield { position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 0.8s ease; }
[data-theme="dark"] .starfield { opacity:1; }
.size-btn-group { display:flex;align-items:center;gap:3px; }
.size-btn { display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:var(--r-full);background:none;border:none;cursor:pointer;color:var(--icon-color);flex-shrink:0;transition:background var(--dur) var(--ease),color var(--dur) var(--ease),transform .18s cubic-bezier(0.16,1,0.3,1) !important; }
.size-btn:hover { background:var(--surface);transform:scale(1.10); } .size-btn:active { transform:scale(.88); }
.size-btn.active { background:var(--primary-dim);color:var(--primary); }
</style>

</head>
<body>

<div class="fluid-orbs" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>
<canvas class="starfield" id="starfield" aria-hidden="true"></canvas>


<header>
  <div class="header-inner">
    <button class="header-logo" id="logoBtn" aria-label="Back to Top">
      <img src="./favicon.png" alt="" class="logo-icon" width="20" height="20">
      <span class="logo-name">LINE EMOJI FINDER</span>
    </button>
    <div class="header-right">
      <div class="size-btn-group" role="group" aria-label="Emoji size">
        <button class="size-btn" data-size="sm" aria-label="Small"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg></button>
        <button class="size-btn" data-size="md" aria-label="Medium"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></button>
        <button class="size-btn active" data-size="lg" aria-label="Large"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="2" y="2" width="20" height="20" rx="2"/></svg></button>
      </div>
      <div class="size-theme-sep" aria-hidden="true"></div>
            <button class="icon-btn" data-theme-toggle aria-label="Light/Dark theme">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<main class="page" id="main">

  <div class="search-card">
    <div class="search-wrap">
      <span class="s-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="OK、Good、!、z、おやすみ、笑　…"
        autocomplete="off" spellcheck="false"
        aria-label="Emoji Keyword Search"
      >
      <button class="s-clear" id="searchClear" aria-label="Clear" tabindex="-1">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <p class="search-sub" id="searchSub">Searches OCR-extracted text in real time</p>
  </div>

  <div class="results-card">
    <div class="results-inner" id="resultsBody">

      <!-- Initial: keyword prompt -->
      <div class="state" id="stateInitial">
        <div class="state-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </div>
        <div class="state-label">
          <span class="state-en">Enter a keyword to search</span>
        </div>
      </div>

      <!-- Empty: no results -->
      <div class="state" id="stateEmpty" style="display:none">
        <div class="state-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M16 16s-1.5-2-4-2-4 2-4 2"/>
            <line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
        </div>
        <div class="state-label">
          <span class="state-en">No results found</span>
        </div>
      </div>

      <!-- Results grid -->
      <div class="emoji-grid" id="emojiGrid" style="display:none"></div>

    </div>
  </div>

  <div class="site-footer">
    <span class="site-footer-hint"></span>
    <a href="https://x.com/__kHz__" class="x-link" target="_blank" rel="noopener noreferrer" aria-label="Author's X profile">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.263 5.634zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      @__kHz__
    </a>
  </div>
</main>

<script>
/* ocr_result.json は fetch で読み込まれます */
</script>
<script>
// THEME
(function(){
  const btn = document.querySelector('[data-theme-toggle]');
  const root = document.documentElement;
  const SUN  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  const MOON = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  let t = root.getAttribute('data-theme') || 'light';
  if(btn){
    btn.innerHTML = t === 'dark' ? SUN : MOON;
    btn.addEventListener('click', () => {
      root.classList.add('theme-switching');
      requestAnimationFrame(() => {
        t = t === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', t);
        btn.innerHTML = t === 'dark' ? SUN : MOON;
        btn.setAttribute('aria-label', t === 'dark' ? 'to light mode' : 'to dark mode');
        setTimeout(() => root.classList.remove('theme-switching'), 900);
      });
    });
  }
})();

// SEARCH
(async function(){
  let data;
  try {
    const res = await fetch('./ocr_result.json');
    if(!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch(e) {
    document.getElementById('stateInitial').innerHTML = '<div class="state-icon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="state-label"><span class="state-en">Failed to load json</span></div>';
    console.error('ocr_result.json load error', e);
    return;
  }

  const inp  = document.getElementById('searchInput');
  const clr  = document.getElementById('searchClear');
  const sub  = document.getElementById('searchSub');
  const grid = document.getElementById('emojiGrid');
  const si   = document.getElementById('stateInitial');
  const se   = document.getElementById('stateEmpty');
  const rb   = document.getElementById('resultsBody');
  const card = rb.closest('.results-card');

  function animateHeight(updateFn) {
    card.style.transition = 'none';
    const fromH = card.scrollHeight;
    card.style.height = fromH + 'px';
    card.getBoundingClientRect();
    updateFn();
    card.style.height = '';
    const toH = card.scrollHeight;
    card.style.height = fromH + 'px';
    card.getBoundingClientRect();
    card.style.transition = '';
    requestAnimationFrame(() => {
      card.style.height = toH + 'px';
      const cleanup = () => { card.style.height = ''; card.style.transition = ''; };
      let done = false;
      const guard = setTimeout(() => { if(!done){ done=true; cleanup(); } }, 700);
      card.addEventListener('transitionend', function h(){
        if(!done){ done=true; clearTimeout(guard); cleanup(); }
        card.removeEventListener('transitionend', h);
      });
    });
  }

  const ERR = '<div class="emoji-err" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>';

  window._emojiSearch = function(q) {
    const t = q.trim().toLowerCase();
    if(!t) return [];
    const res = [];
    for(const [setId, set] of Object.entries(data.emoji_sets)){
      for(const [imgId, img] of Object.entries(set.images)){
        const ft = img.full_text.toLowerCase();
        if(ft && ft.includes(t)){
          res.push({
            label:  img.full_text,
            imgUrl: `https://stickershop.line-scdn.net/sticonshop/v1/sticon/${setId}/iPhone/${imgId}.png`,
            href:   `https://store.line.me/emojishop/product/${setId}/ja`
          });
        }
      }
    }
    return res;
  };

  window._emojiRender = function(results) {
    if(!results.length){
      animateHeight(() => {
        si.style.display = 'none';
        se.style.display = 'flex';
        grid.style.display = 'none';
        grid.replaceChildren();
      });
      sub.textContent = 'No emoji found';
      return;
    }
    sub.textContent = results.length + ' HIT';
    const STAGGER = 48, MAXDELAY = 700;
    const frag = document.createDocumentFragment();
    results.forEach((r, i) => {
      const delay = Math.min(i * STAGGER, MAXDELAY);
      const a = document.createElement('a');
      a.className = 'emoji-card';
      a.href = r.href; a.target = '_blank'; a.rel = 'noopener noreferrer';
      a.setAttribute('aria-label', (r.label||'絵文字') + ' — LINE STOREで購入');
      a.style.animationDelay = delay + 'ms';
      const img = document.createElement('img');
      img.src = r.imgUrl; img.alt = r.label||'';
      img.width = 80; img.height = 80;
      img.loading = 'lazy'; img.decoding = 'async';
      img.onerror = function(){ a.innerHTML = ERR; };
      a.appendChild(img);
      if(r.label){
        const lbl = document.createElement('span');
        lbl.className = 'emoji-lbl'; lbl.textContent = r.label;
        a.appendChild(lbl);
      }
      frag.appendChild(a);
    });
    animateHeight(() => {
      si.style.display = 'none';
      se.style.display = 'none';
      grid.style.display = 'grid';
      grid.replaceChildren(frag);
    });
  };

  function reset() {
    animateHeight(() => {
      si.style.display = '';
      se.style.display = 'none';
      grid.style.display = 'none';
      grid.replaceChildren();
    });
    sub.textContent = 'Searches OCR-extracted text in real time';
  }

  let timer = null;
  let composing = false;
  inp.addEventListener('compositionstart', () => { composing = true; });
  inp.addEventListener('compositionend', () => {
    composing = false;
    const v = inp.value;
    clr.classList.toggle('on', v.length > 0);
    clearTimeout(timer);
    if(!v.trim()){ reset(); return; }
    timer = setTimeout(() => window._emojiRender(window._emojiSearch(v)), 180);
  });
  inp.addEventListener('input', function(){
    const v = this.value;
    clr.classList.toggle('on', v.length > 0);
    if(composing) return;
    clearTimeout(timer);
    if(!v.trim()){ reset(); return; }
    timer = setTimeout(() => window._emojiRender(window._emojiSearch(v)), 180);
  });
  clr.addEventListener('click', () => {
    inp.value = ''; clr.classList.remove('on');
    reset(); inp.focus();
  });
})();

// STARFIELD
(function(){
  const canvas = document.getElementById('starfield');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const stars = [];
  const N = 260;
  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  function gen(){ stars.length=0; for(let i=0;i<N;i++) stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.2+0.2,a:Math.random()*.55+.15,sp:Math.random()*.0006+.0002,ph:Math.random()*Math.PI*2}); }
  let f=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const t=f*.012; f++;
    stars.forEach(s=>{ const al=s.a*(.65+.35*Math.sin(t*s.sp*120+s.ph)); ctx.beginPath(); ctx.arc(s.x*canvas.width,s.y*canvas.height,s.r,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,'+al+')'; ctx.fill(); });
    requestAnimationFrame(draw);
  }
  resize(); gen();
  window.addEventListener('resize', resize, {passive:true});
  draw();
})();

// GRID MORPH
(function(){
  const sub = document.getElementById('searchSub');
  if(!sub) return;
  new MutationObserver(() => {
    sub.classList.add('morph-out');
    requestAnimationFrame(() => requestAnimationFrame(() => sub.classList.remove('morph-out')));
  }).observe(sub, {childList:true, characterData:true, subtree:true});
})();

// SIZE CONTROL
(function(){
  const grid = document.getElementById('emojiGrid');
  if(!grid) return;
  function applyKey(key){
    grid.setAttribute('data-size', key);
    const inp = document.getElementById('searchInput');
    const v = inp ? inp.value : '';
    if(v && v.trim() && window._emojiSearch && window._emojiRender){
      window._emojiRender(window._emojiSearch(v));
    }
  }
  applyKey('lg');
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if(btn.classList.contains('active')) return;
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyKey(btn.dataset.size);
    });
  });
})();

// LOGO: scroll to top & focus search
(function(){
  const btn = document.getElementById('logoBtn');
  if(!btn) return;
  btn.addEventListener('click', function(){
    window.scrollTo({top: 0, behavior: 'smooth'});
    const inp = document.getElementById('searchInput');
    if(!inp) return;
    if(window.scrollY === 0){
      inp.focus();
    } else {
      const onScroll = function(){
        if(window.scrollY === 0){
          window.removeEventListener('scroll', onScroll);
          inp.focus();
        }
      };
      window.addEventListener('scroll', onScroll);
      setTimeout(function(){ window.removeEventListener('scroll', onScroll); inp.focus(); }, 700);
    }
  });
})();
</script>
</body>
</html>
